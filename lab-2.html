<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
    background: linear-gradient(145deg, #f0f5fb 0%, #e9eff7 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem;
}

h1 {
    font-size: 2.6rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #1e2b4a, #2c3f66);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 2rem;
    text-shadow: 0 2px 5px rgba(0,20,40,0.1);
}

/* main dashboard card */
#search-main-container {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 2.5rem;
    box-shadow: 0 25px 45px -12px rgba(18, 31, 56, 0.25), inset 0 1px 2px rgba(255,255,255,0.7);
    padding: 2rem 2.2rem;
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    margin-bottom: 2rem;
    border: 1px solid rgba(255,255,255,0.5);
}

#search-city-box {
    flex: 2 1 280px;
}

#search-history-box {
    flex: 1.2 1 220px;
    background: rgba(255,255,255,0.3);
    border-radius: 2rem;
    padding: 1.5rem 1.5rem 1.8rem;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.6);
}

h3 {
    font-size: 1.3rem;
    font-weight: 500;
    color: #1b2b4a;
    margin-bottom: 1.2rem;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
}
h3::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 1.8rem;
    background: linear-gradient(#3f6190, #7899cf);
    border-radius: 20px;
    margin-right: 8px;
}

/* form */
form {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 0.5rem;
}

input {
    flex: 3 1 180px;
    padding: 0.9rem 1.2rem;
    border: none;
    background: rgba(255,255,255,0.7);
    border-radius: 60px;
    font-size: 1rem;
    font-weight: 400;
    color: #15273f;
    box-shadow: 0 4px 8px rgba(0, 10, 30, 0.05), inset 0 1px 3px rgba(0,0,0,0.02);
    backdrop-filter: blur(4px);
    transition: 0.2s ease;
    border: 1px solid rgba(255,255,255,0.7);
}

input:focus {
    outline: none;
    background: white;
    box-shadow: 0 8px 18px -8px rgba(43, 77, 120, 0.2), 0 0 0 3px rgba(108, 143, 200, 0.3);
    border-color: transparent;
}

button {
    background: #2c4068;
    border: none;
    padding: 0.9rem 2rem;
    border-radius: 60px;
    font-weight: 500;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 16px -6px #1f2f4e;
    transition: all 0.15s ease;
    border: 1px solid rgba(255,255,255,0.2);
    letter-spacing: 0.3px;
    backdrop-filter: blur(4px);
}

button:hover {
    background: #1e3155;
    transform: translateY(-2px);
    box-shadow: 0 12px 22px -10px #121f38;
}

button:active {
    transform: translateY(1px);
    box-shadow: 0 4px 8px -3px #1e2b44;
}

/* search history */
#searched-cities-box {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    max-height: 250px;
    overflow-y: auto;
    padding-right: 5px;
}

.history-item {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(4px);
    border-radius: 50px;
    padding: 0.6rem 1.2rem;
    font-size: 0.98rem;
    font-weight: 480;
    color: #1b334f;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    border: 1px solid rgba(255,255,255,0.7);
    transition: 0.1s ease;
    cursor: default;
    display: flex;
    align-items: center;
    gap: 6px;
}

.history-item::before {
    content: "⌂";
    font-size: 1.1rem;
    opacity: 0.6;
    margin-right: 6px;
}

.history-item:hover {
    background: rgba(255,255,255,0.8);
    border-color: #a3bbdd;
}

/* weather info container */
#weather-info-container {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    border-radius: 2.5rem;
    padding: 2rem 2.2rem;
    width: 100%;
    max-width: 1100px;
    box-shadow: 0 20px 40px -12px rgba(17, 32, 58, 0.2);
    border: 1px solid rgba(255,255,255,0.6);
}

#city-weather-container {
    min-height: 130px;
    transition: 0.2s;
}

/* weather card */
.weather-card {
    background: linear-gradient(115deg, #ffffffd9 0%, #f5faff 100%);
    border-radius: 2rem;
    padding: 1.8rem 2rem;
    backdrop-filter: blur(8px);
    box-shadow: inset 0 1px 4px rgba(255,255,255,0.8), 0 10px 20px -10px #1529442e;
    border: 1px solid rgba(255,255,255,0.9);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 1rem 2rem;
    color: #14273e;
}

.weather-main {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.city-name {
    font-size: 2rem;
    font-weight: 450;
    letter-spacing: -0.02em;
    line-height: 1.2;
}
.city-name span {
    font-size: 1.2rem;
    font-weight: 380;
    background: rgba(70, 110, 160, 0.15);
    padding: 0.2rem 0.9rem;
    border-radius: 40px;
    margin-left: 0.8rem;
}

.temp-large {
    font-size: 3.2rem;
    font-weight: 500;
    color: #10233d;
    line-height: 1;
}
.temp-large small {
    font-size: 1.4rem;
    font-weight: 350;
    color: #3f5579;
}

.weather-details {
    display: flex;
    flex-wrap: wrap;
    gap: 1.8rem 2.5rem;
    background: rgba(245, 250, 255, 0.7);
    padding: 1rem 2rem;
    border-radius: 3rem;
    backdrop-filter: blur(4px);
}

.detail-item {
    display: flex;
    flex-direction: column;
}
.detail-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #4b6382;
}
.detail-value {
    font-size: 1.5rem;
    font-weight: 430;
    color: #142f51;
}
.detail-value unit {
    font-size: 0.95rem;
    color: #5f779b;
    margin-left: 4px;
}

/* empty state */
.placeholder-message {
    color: #4a6185;
    font-size: 1.1rem;
    padding: 1.5rem 1rem;
    background: rgba(255,255,255,0.3);
    border-radius: 3rem;
    text-align: center;
    backdrop-filter: blur(4px);
    font-weight: 400;
}

/* scrollbar history */
#searched-cities-box::-webkit-scrollbar {
    width: 6px;
}
#searched-cities-box::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
}
#searched-cities-box::-webkit-scrollbar-thumb {
    background: #9bb1cf;
    border-radius: 20px;
}
    </style>
</head>
<body>
    <h1>Async Weather Tracker</h1>
    <div id="search-main-container">
        <div id="search-city-box">
            <h3>Search City</h3>
            <form action="">
                <input type="text" name="" id="city">
                <button type="submit">Search</button>
            </form>

            
        </div>

        <div id="search-history-box">
            <h3>Search History</h3>
            <div id="searched-cities-box">
            </div>

        </div>

    </div>
    
    <div id="weather-info-container">
        <h3>Weather Info</h3>
        <div id="city-weather-container">
        </div>
    </div> 

    <script>
        let form=document.querySelector("form");
        let city=document.querySelector("#city");
        let weather=document.querySelector("#city-weather-container");
        let API_KEY="af9f63c59a649f27d602b96a43d0bd14";
        
        async function getWeather(city){
         let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
         
         let data=await response.json();
         let card=document.createElement("div");
         card.innerHTML=`<div>City: ${data.name},${data.sys.country}</div>
                         <div>Temp : ${data.main.temp}°C</div>
                         <div>Weather : ${data.weather[0].main}</div>
                         <div>Humidity: ${data.main.humidity}</div>
                         <div>Wind : ${data.wind.speed}</div>`
        weather.innerHTML="";                
        weather.append(card);
        }
    
        form.addEventListener("submit",(event)=>{
            event.preventDefault();
            getWeather(city.value);
        }); 
       

    
    
    
    
    </script>
</body>
</html>
